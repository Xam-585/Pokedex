<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./style/standard.css">
    <link rel="stylesheet" href="./style/fonts.css">
    <link rel="stylesheet" href="./style/asset.css">
    <link rel="stylesheet" href="./style/typeBackgrounds.css">
    <script src="./script.js"></script>
    <script src="./scripts/template.js"></script>
</head>
<body onload="loadData()">
    <header>
            <form class="search-bar" onsubmit="search(); return false">
                <input type="text" placeholder="Search youre Pokemon..." id="search-input" minlength="3" name="search-input">
                <button type="submit" value="submit">Search</button>
            </form>
    </header>
    <main>
        <dialog id="dialog" aria-label="Popup" onclick="closeDialog(); PreventEventBubbling(event)"></dialog>
        <section id="content" class="content">
            <div class="title "><h1>Pokedex</h1></div>
        </section>
        <section>
            <div class="Page-control" id="Page-control"></div> 
        </section>
    </main>
    <footer>
    </footer>
</body>
</html>
